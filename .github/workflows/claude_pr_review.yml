name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Find what (if anything) we already reviewed on this PR. The reviewer is
      # otherwise stateless: it would re-read the whole branch every push, re-raise
      # findings the author already fixed or deliberately declined, and — with the
      # obvious issues gone — keep dredging up progressively more marginal ones.
      - name: Resolve review scope
        id: scope
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            fs.mkdirSync('.claude-review', { recursive: true });

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Claude PR Review')
            );

            let previousSha = '';
            if (existing) {
              // Written by the posting step below as: - Commit: `<sha>`
              const m = existing.body.match(/- Commit: `([0-9a-f]{7,40})`/);
              if (m) previousSha = m[1];
              fs.writeFileSync('.claude-review/previous-review.md', existing.body);
            } else {
              fs.writeFileSync('.claude-review/previous-review.md', '');
            }

            // Only treat it as incremental if that commit is actually an ancestor
            // of HEAD — a force-push or rebase makes the old SHA meaningless.
            let incremental = false;
            if (previousSha) {
              try {
                await exec.exec('git', ['merge-base', '--is-ancestor', previousSha, 'HEAD']);
                incremental = true;
              } catch {
                core.info(`Previous SHA ${previousSha} is not an ancestor of HEAD (force-push?) — full review.`);
              }
            }

            core.setOutput('previous_sha', incremental ? previousSha : '');
            core.setOutput('incremental', String(incremental));

      - name: Run Claude review
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # The review comes back as structured output, not a file. Asking the model
          # to remember a final Write is the step that kept getting dropped on large
          # branches; --json-schema makes the SDK require the field before the run
          # can end successfully.
          claude_args: >-
            --model claude-sonnet-5
            --allowedTools "Read,Grep,Glob,Bash(git:*)"
            --json-schema '{"type":"object","properties":{"review":{"type":"string","description":"The complete PR review as GitHub-flavored markdown, following the structure in claude_pr_instructions.md. This is posted verbatim as a PR comment."}},"required":["review"]}'
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }} ("${{ github.event.pull_request.title }}")
            on branch ${{ github.head_ref }} -> ${{ github.base_ref }}, authored by ${{ github.event.pull_request.user.login }}.

            You have a full checkout of this repository and may use Read, Grep, Glob,
            and read-only git commands. Use them. You are NOT limited to the diff.

            ## Scope

            Incremental run: ${{ steps.scope.outputs.incremental }}
            Previously reviewed commit: ${{ steps.scope.outputs.previous_sha }}

            If the incremental flag above is `true`:
              - The NEW work to review is: `git diff ${{ steps.scope.outputs.previous_sha }}..HEAD`
              - Everything before that commit was already reviewed in a prior round.
                Read `.claude-review/previous-review.md` for what you said last time.
                Findings there were either fixed or deliberately declined by the author.
                DO NOT re-raise them. If you believe a prior finding was fixed
                incorrectly, say so explicitly and show the code that proves it.
              - Use `git diff origin/${{ github.base_ref }}...HEAD` only as background
                context for understanding the new commits. Do not mine it for new findings.
            Otherwise review the full branch: `git diff origin/${{ github.base_ref }}...HEAD`

            This branch can be large. Do NOT dump the whole diff into context in one
            command — start with `git diff --stat <range>` to see the shape of it, then
            pull per-file diffs (`git diff <range> -- <path>`) for the files that matter
            and Read the surrounding code. A single giant diff crowds out the context you
            need to actually verify findings.

            Ignore lockfiles (package-lock.json, yarn.lock, pnpm-lock.yaml) and
            anything under drizzle/meta/ — they are generated.

            ## Verification is mandatory

            You can open any file in this repo, so there is no excuse for a guess.
            Before you report ANY finding, verify it by reading the relevant code.

            - If a finding depends on how a function behaves, READ that function.
            - If it depends on a schema, constraint, or index, READ the schema.
            - If it depends on whether a caller exists, GREP for callers.
            - Then state what you found, citing file:line.

            You may not write a finding containing "depending on how", "if the table
            has", "may be", "worth confirming", "verify that", or any equivalent
            hedge about code you could have read. Either verify it and report it as
            fact, or delete it. A hedged finding costs the author a round-trip to
            disprove and is worse than silence.

            Read the review conventions and the structure to follow in
            `claude_pr_instructions.md`, and the project context in `CLAUDE.md`.

            ## Output

            Return your finished review as markdown in the `review` field of your
            structured output. Do NOT post a comment yourself and do not write it to a
            file — a later workflow step publishes it.

            Budget your context so you can still produce that review. If you are running
            low, stop investigating and return the review you have.

      - name: Post review comment
        uses: actions/github-script@v7
        env:
          STRUCTURED_OUTPUT: ${{ steps.claude.outputs.structured_output }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        with:
          script: |
            const fs = require('fs');

            let review = '';
            try {
              review = (JSON.parse(process.env.STRUCTURED_OUTPUT || '{}').review || '').trim();
            } catch (e) {
              core.info(`Could not parse structured output: ${e.message}`);
            }

            // Backstop: if the schema field is missing, the review text may still be
            // sitting in the run's final assistant message. Recovering it beats
            // throwing away a finished review.
            if (!review && process.env.EXECUTION_FILE) {
              try {
                const log = JSON.parse(fs.readFileSync(process.env.EXECUTION_FILE, 'utf8'));
                const texts = (Array.isArray(log) ? log : [log])
                  .filter(e => e.type === 'assistant')
                  .flatMap(e => (e.message?.content ?? []).filter(c => c.type === 'text').map(c => c.text));
                const last = texts[texts.length - 1]?.trim();
                if (last && last.length > 400) {
                  review = last;
                  core.warning('No structured output; recovered the review from the execution log.');
                }
              } catch (e) {
                core.info(`Could not recover review from execution log: ${e.message}`);
              }
            }

            if (!review) {
              core.setFailed('Claude produced no review output (no structured output and no usable final message).');
              return;
            }

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('## Claude PR Review')
            );

            const sha = '${{ github.event.pull_request.head.sha }}';
            const incremental = '${{ steps.scope.outputs.incremental }}' === 'true';
            const previousSha = '${{ steps.scope.outputs.previous_sha }}';

            const scopeNote = incremental
              ? `Reviewed \`${previousSha.slice(0, 7)}..${sha.slice(0, 7)}\` (new commits since the last review).`
              : `Reviewed the full branch.`;

            const body = `## Claude PR Review

            ${review}

            ---
            *Automated review. ${scopeNote} Reply to this comment or use \`@claude\` to ask follow-ups.*

            <details>
            <summary>Review metadata</summary>

            - Commit: \`${sha}\`
            - Reviewed at: ${new Date().toISOString()}
            </details>`;

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
              console.log('Updated existing review comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Created new review comment');
            }

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Failed to generate Claude review. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`
            });
